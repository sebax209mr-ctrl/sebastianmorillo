<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soccer Recruiting Profile</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  
  <!-- React and ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel Standalone for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: #ffffff;
      min-height: 100vh;
      color: #1a1a1a;
    }

    #root {
      min-height: 100vh;
    }

    nav {
      background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
      padding: 0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .nav-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 2rem;
    }

    .logo {
      font-family: 'Outfit', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: white;
      letter-spacing: -0.5px;
      padding: 1.5rem 0;
    }

    .nav-links {
      display: flex;
      gap: 0.5rem;
    }

    .nav-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.7);
      padding: 1.5rem 1.25rem;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      transition: color 0.15s ease, background 0.15s ease, border-color 0.15s ease;
      border-bottom: 3px solid transparent;
      letter-spacing: 0.3px;
    }

    .nav-btn:hover {
      color: white;
      background: rgba(255,255,255,0.1);
    }

    .nav-btn.active {
      color: white;
      border-bottom-color: #60a5fa;
      background: rgba(255,255,255,0.05);
    }

    .page-content {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 2rem;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .page-title {
      font-family: 'Outfit', sans-serif;
      font-size: 2.5rem;
      font-weight: 800;
      color: #1e3a8a;
      margin-bottom: 2rem;
      letter-spacing: -1px;
    }

    .profile-header {
      display: grid;
      grid-template-columns: 300px 1fr;
      gap: 3rem;
      margin-bottom: 3rem;
      padding: 2rem;
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
      border-radius: 16px;
      border: 1px solid #e2e8f0;
    }

    .profile-photo-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .profile-photo {
      width: 240px;
      height: 240px;
      border-radius: 16px;
      overflow: hidden;
      background: white;
      border: 4px solid #1e3a8a;
      box-shadow: 0 10px 40px rgba(30, 58, 138, 0.2);
    }

    .profile-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .photo-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: #94a3b8;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
    }

    .photo-placeholder span {
      font-size: 0.9rem;
      font-weight: 500;
    }

    .upload-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      background: #1e3a8a;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.9rem;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      will-change: transform;
    }

    .upload-btn:hover {
      background: #1e40af;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(30, 58, 138, 0.3);
    }

    .profile-details {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .name-input {
      font-family: 'Outfit', sans-serif;
      font-size: 2.5rem;
      font-weight: 800;
      color: #1e3a8a;
      border: none;
      border-bottom: 3px solid transparent;
      padding: 0.25rem 0;
      background: transparent;
      letter-spacing: -1px;
      transition: all 0.3s ease;
    }

    .name-input:focus {
      outline: none;
      border-bottom-color: #60a5fa;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .stat-item {
      background: white;
      padding: 1rem;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
    }

    .stat-item label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-item input {
      width: 100%;
      border: none;
      background: transparent;
      font-size: 1.1rem;
      font-weight: 600;
      color: #1a1a1a;
      padding: 0.25rem 0;
    }

    .stat-item input:focus {
      outline: none;
    }

    .bio-section {
      background: #f8fafc;
      padding: 2rem;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      margin-bottom: 2rem;
    }

    .bio-section h2 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: #1e3a8a;
      margin-bottom: 1rem;
    }

    .bio-section textarea {
      width: 100%;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      padding: 1rem;
      font-size: 1rem;
      line-height: 1.7;
      resize: vertical;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.3s ease;
    }

    .bio-section textarea:focus {
      outline: none;
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1);
    }

    .action-buttons {
      display: flex;
      gap: 1rem;
      justify-content: flex-end;
      margin-top: 2rem;
    }

    .save-btn, .download-btn {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 1rem 2rem;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      font-family: 'DM Sans', sans-serif;
      will-change: transform;
    }

    .save-btn {
      background: #1e3a8a;
      color: white;
    }

    .save-btn:hover {
      background: #1e40af;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(30, 58, 138, 0.3);
    }

    .download-btn {
      background: white;
      color: #1e3a8a;
      border: 2px solid #1e3a8a;
    }

    .download-btn:hover {
      background: #f8fafc;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(30, 58, 138, 0.15);
    }

    .save-status {
      position: fixed;
      top: 100px;
      right: 2rem;
      background: #10b981;
      color: white;
      padding: 1rem 1.5rem;
      border-radius: 8px;
      font-weight: 600;
      box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
      animation: slideIn 0.3s ease;
      z-index: 1001;
    }

    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 1.5rem;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid #e2e8f0;
      border-top-color: #1e3a8a;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 1.25rem;
      color: #64748b;
      font-weight: 500;
    }

    @keyframes slideIn {
      from { transform: translateX(400px); }
      to { transform: translateX(0); }
    }

    .timeline {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .timeline-card {
      background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
      border-radius: 16px;
      padding: 2rem;
      border: 2px solid #e2e8f0;
      box-shadow: 0 4px 16px rgba(0,0,0,0.05);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      will-change: transform;
    }

    .timeline-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(30, 58, 138, 0.12);
    }

    .timeline-year {
      font-family: 'Outfit', sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      color: #1e3a8a;
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 3px solid #60a5fa;
    }

    .timeline-content {
      display: grid;
      grid-template-columns: 250px 1fr;
      gap: 2rem;
    }

    .timeline-image {
      position: relative;
      width: 100%;
      height: 250px;
      border-radius: 12px;
      overflow: hidden;
      background: #f1f5f9;
    }

    .timeline-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
      color: #94a3b8;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
    }

    .upload-btn-small {
      position: absolute;
      bottom: 0.75rem;
      right: 0.75rem;
      background: rgba(30, 58, 138, 0.9);
      color: white;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.25rem;
      transition: transform 0.15s ease, background 0.15s ease;
      will-change: transform;
    }

    .upload-btn-small:hover {
      background: #1e3a8a;
      transform: translateY(-1px);
    }

    .timeline-details {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .edit-field {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .edit-field.full-width {
      grid-column: 1 / -1;
    }

    .edit-field label {
      font-size: 0.85rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .edit-field input,
    .edit-field textarea {
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      padding: 0.75rem;
      font-size: 1rem;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      will-change: border-color;
    }

    .edit-field input:focus,
    .edit-field textarea:focus {
      outline: none;
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1);
    }

    .academic-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .academic-card {
      background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
      border-radius: 16px;
      padding: 2rem;
      border: 2px solid #e2e8f0;
      box-shadow: 0 4px 16px rgba(0,0,0,0.05);
    }

    .academic-card h3 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e3a8a;
      margin-bottom: 1.5rem;
    }

    .edit-fields-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1rem;
    }

    .chart-container {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 0;
    }

    .gpa-chart {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .gpa-circle {
      position: relative;
      width: 200px;
      height: 200px;
    }

    .gpa-value {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Outfit', sans-serif;
      font-size: 3rem;
      font-weight: 800;
      color: #1e3a8a;
    }

    .gpa-label {
      font-size: 1rem;
      font-weight: 600;
      color: #64748b;
    }

    .sat-bars {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .sat-bar-item {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .sat-bar-label {
      font-weight: 600;
      color: #64748b;
      font-size: 0.9rem;
    }

    .sat-bar {
      height: 40px;
      background: #e2e8f0;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }

    .sat-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #1e3a8a 0%, #3b82f6 100%);
      transition: width 0.5s ease;
      border-radius: 8px;
    }

    .sat-bar-value {
      font-weight: 700;
      color: #1e3a8a;
      font-size: 1.1rem;
      margin-top: 0.25rem;
    }

    .sat-total {
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e3a8a;
      text-align: center;
      padding-top: 1rem;
      border-top: 2px solid #e2e8f0;
    }

    .video-section {
      background: #f8fafc;
      padding: 2rem;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
      margin-bottom: 2rem;
    }

    .video-section h3 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e3a8a;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .video-preview {
      margin-top: 1rem;
      padding: 1rem;
      background: white;
      border-radius: 8px;
      border: 1px solid #e2e8f0;
      font-size: 0.9rem;
      color: #64748b;
    }

    .contacts-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .contact-card {
      background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
      border-radius: 16px;
      padding: 2rem;
      border: 2px solid #e2e8f0;
      box-shadow: 0 4px 16px rgba(0,0,0,0.05);
    }

    .contact-card h3 {
      font-family: 'Outfit', sans-serif;
      font-size: 1.5rem;
      font-weight: 700;
      color: #1e3a8a;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .contact-card.player-contact {
      grid-column: 1 / -1;
      background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
      color: white;
    }

    .contact-card.player-contact h3 {
      color: white;
    }

    .contact-card.player-contact label {
      color: rgba(255,255,255,0.9);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .contact-card.player-contact input {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.2);
      color: white;
    }

    .contact-card.player-contact input::placeholder {
      color: rgba(255,255,255,0.5);
    }

    .contact-card.player-contact input:focus {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.4);
    }

    .tournaments-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .tournament-card {
      background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
      border-radius: 16px;
      padding: 2rem;
      border: 2px solid #e2e8f0;
      box-shadow: 0 4px 16px rgba(0,0,0,0.05);
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      will-change: transform;
    }

    .tournament-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(30, 58, 138, 0.12);
      border-color: #60a5fa;
    }

    .tournament-number {
      font-family: 'Outfit', sans-serif;
      font-size: 1.25rem;
      font-weight: 800;
      color: #1e3a8a;
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 3px solid #60a5fa;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .tournament-content {
      display: grid;
      grid-template-columns: 200px 1fr;
      gap: 1.5rem;
    }

    .tournament-image {
      position: relative;
      width: 100%;
      height: 200px;
      border-radius: 12px;
      overflow: hidden;
      background: #f1f5f9;
      flex-shrink: 0;
    }

    .tournament-image img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .tournament-fields {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .jersey-number-field {
      background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
      padding: 1.5rem;
      border-radius: 12px;
      margin-top: 0.5rem;
    }

    .jersey-number-field label {
      color: white !important;
      font-size: 1rem;
      font-weight: 700;
    }

    .jersey-input {
      background: rgba(255,255,255,0.15) !important;
      border-color: rgba(255,255,255,0.3) !important;
      color: white !important;
      font-size: 1.5rem !important;
      font-weight: 800 !important;
      text-align: center;
      font-family: 'Outfit', sans-serif !important;
    }

    .jersey-input::placeholder {
      color: rgba(255,255,255,0.5);
    }

    .jersey-input:focus {
      background: rgba(255,255,255,0.25) !important;
      border-color: rgba(255,255,255,0.5) !important;
    }

    @media (max-width: 768px) {
      .profile-header {
        grid-template-columns: 1fr;
        gap: 2rem;
      }

      .stats-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .timeline-content {
        grid-template-columns: 1fr;
      }

      .academic-grid {
        grid-template-columns: 1fr;
      }

      .contacts-grid {
        grid-template-columns: 1fr;
      }

      .tournaments-grid {
        grid-template-columns: 1fr;
      }

      .tournament-content {
        grid-template-columns: 1fr;
      }

      .tournament-image {
        height: 180px;
      }

      .nav-links {
        flex-wrap: wrap;
      }

      .nav-btn {
        padding: 1rem 0.75rem;
        font-size: 0.85rem;
      }

      .edit-fields-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // Simple icon components using Lucide
    const Icon = ({ name, size = 24 }) => {
      const iconRef = React.useRef(null);
      
      useEffect(() => {
        if (iconRef.current && window.lucide) {
          lucide.createIcons({ 
            icons: { [name]: lucide[name] },
            attrs: { width: size, height: size }
          });
        }
      }, [name, size]);
      
      return <i ref={iconRef} data-lucide={name}></i>;
    };

    function SoccerRecruitingWebsite() {
      const [currentPage, setCurrentPage] = useState('home');
      const [saveStatus, setSaveStatus] = useState('');
      const [isLoading, setIsLoading] = useState(true);
      const [profileData, setProfileData] = useState({
        fullName: 'Your Name',
        gradYear: '2026',
        height: '5\'10"',
        weight: '165 lbs',
        dob: 'MM/DD/YYYY',
        dominantFoot: 'Right',
        primaryPosition: 'Center Midfielder',
        secondaryPosition: 'Attacking Midfielder',
        clubTeam: 'Your Club Team',
        clubLevel: 'ECNL / MLS Next / DA',
        bio: 'Write your player bio here. Describe your playing style, leadership qualities, work ethic, key strengths, and soccer goals. College coaches will read this to understand who you are as a player and person.',
        profileImage: null
      });

      const [journeyData, setJourneyData] = useState({
        freshman: {
          team: 'Freshman Year Team',
          level: 'Club Level',
          league: 'League Name',
          description: 'Describe your freshman year experience...',
          image: null
        },
        sophomore: {
          team: 'Sophomore Year Team',
          level: 'Club Level',
          league: 'League Name',
          description: 'Describe your sophomore year experience...',
          image: null
        },
        junior: {
          team: 'Junior Year Team',
          level: 'Club Level',
          league: 'League Name',
          description: 'Describe your junior year experience...',
          image: null
        },
        senior: {
          team: 'Senior Year Team',
          level: 'Club Level',
          league: 'League Name',
          description: 'Describe your senior year experience...',
          image: null
        }
      });

                <label>Email</label>
                <input
                  type="email"
                  value={contactData.privateCoachEmail}
                  onChange={(e) => setContactData({...contactData, privateCoachEmail: e.target.value})}
                />
              </div>
              <div className="edit-field">
                <label>Phone</label>
                <input
                  type="tel"
                  value={contactData.privateCoachPhone}
                  onChange={(e) => setContactData({...contactData, privateCoachPhone: e.target.value})}
                />
              </div>
            </div>

            <div className="contact-card player-contact">
              <h3>My Contact Information</h3>
              <div className="edit-field">
                <label><Icon name="mail" size={18} /> Email</label>
                <input
                  type="email"
                  value={contactData.playerEmail}
                  onChange={(e) => setContactData({...contactData, playerEmail: e.target.value})}
                />
              </div>
              <div className="edit-field">
                <label><Icon name="phone" size={18} /> Phone</label>
                <input
                  type="tel"
                  value={contactData.playerPhone}
                  onChange={(e) => setContactData({...contactData, playerPhone: e.target.value})}
                />
              </div>
              <div className="edit-field">
                <label><Icon name="instagram" size={18} /> Instagram</label>
                <input
                  type="text"
                  value={contactData.instagram}
                  onChange={(e) => setContactData({...contactData, instagram: e.target.value})}
                />
              </div>
              <div className="edit-field">
                <label>Facebook/X</label>
                <input
                  type="text"
                  value={contactData.facebook}
                  onChange={(e) => setContactData({...contactData, facebook: e.target.value})}
                />
              </div>
              <div className="edit-field">
                <label>TikTok</label>
                <input
                  type="text"
                  value={contactData.tiktok}
                  onChange={(e) => setContactData({...contactData, tiktok: e.target.value})}
                />
              </div>
            </div>
          </div>

          <div className="action-buttons">
            <button className="save-btn" onClick={() => saveData('soccer-contacts', contactData)}>
              <Icon name="save" size={20} />
              Save Contacts
            </button>
          </div>
        </div>
      );

      return (
        <div>
          <nav>
            <div className="nav-content">
              <div className="logo">ATHLETE PROFILE</div>
              <div className="nav-links">
                <button
                  className={`nav-btn ${currentPage === 'home' ? 'active' : ''}`}
                  onClick={() => setCurrentPage('home')}
                >
                  Home
                </button>
                <button
                  className={`nav-btn ${currentPage === 'journey' ? 'active' : ''}`}
                  onClick={() => setCurrentPage('journey')}
                >
                  Soccer Journey
                </button>
                <button
                  className={`nav-btn ${currentPage === 'academics' ? 'active' : ''}`}
                  onClick={() => setCurrentPage('academics')}
                >
                  Academics
                </button>
                <button
                  className={`nav-btn ${currentPage === 'videos' ? 'active' : ''}`}
                  onClick={() => setCurrentPage('videos')}
                >
                  Videos
                </button>
                <button
                  className={`nav-btn ${currentPage === 'tournaments' ? 'active' : ''}`}
                  onClick={() => setCurrentPage('tournaments')}
                >
                  Tournaments
                </button>
                <button
                  className={`nav-btn ${currentPage === 'contacts' ? 'active' : ''}`}
                  onClick={() => setCurrentPage('contacts')}
                >
                  Contacts
                </button>
              </div>
            </div>
          </nav>

          {saveStatus && <div className="save-status">{saveStatus}</div>}

          {isLoading ? (
            <div className="loading-screen">
              <div className="loading-spinner"></div>
              <div className="loading-text">Loading your profile...</div>
            </div>
          ) : (
            <>
              {currentPage === 'home' && <HomePage />}
              {currentPage === 'journey' && <JourneyPage />}
              {currentPage === 'academics' && <AcademicsPage />}
              {currentPage === 'videos' && <VideosPage />}
              {currentPage === 'tournaments' && <TournamentsPage />}
              {currentPage === 'contacts' && <ContactsPage />}
            </>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<SoccerRecruitingWebsite />);
  </script>
</body>
</html>
